<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cosmos — Brand Site (hi-fi)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=DM+Serif+Display&display=swap">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="cosmos-site.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="site-data.js"></script>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#27282a"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="#88a3ca" stroke-width="3"/>
    <circle cx="50" cy="50" r="4" fill="#ff946b"/>
    <circle cx="76" cy="34" r="3" fill="#86d6a2"/>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="LandingPage.jsx"></script>
<script type="text/babel" src="ProductDetailPage.jsx"></script>
<script type="text/babel" src="HabitatPage.jsx"></script>
<script type="text/babel">
const { createElement: h, Fragment } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "line": "vessel",
  "showTints": true
}/*EDITMODE-END*/;

const NAV = [
  { id: "landing", label: "home" },
  { id: "product", label: "system" },
  { id: "habitat", label: "the habitat" },
];

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState("landing");

  const go = (id, line) => {
    if (line) setTweak("line", line);
    setPage(id);
    window.scrollTo({ top: 0 });
  };

  React.useEffect(() => {
    document.body.classList.toggle("no-tints", !t.showTints);
  }, [t.showTints]);

  let body;
  if (page === "product") body = h(window.ProductDetailPage, { line: t.line, go });
  else if (page === "habitat") body = h(window.HabitatPage, { go });
  else body = h(window.LandingPage, { line: t.line, go });

  return h(Fragment, null,
    h("div", { className: "app theme-" + t.line },

      /* NAV */
      h("nav", { className: "nav" },
        h("div", { className: "brand" },
          h("img", { src: "assets/cosmos-logo.svg", alt: "cosmos", onClick: () => go("landing") })
        ),
        h("div", { className: "menu" },
          NAV.map((n) =>
            h("button", {
              key: n.id,
              className: page === n.id ? "active" : "",
              onClick: () => go(n.id)
            }, n.label)
          )
        ),
        h("div", { className: "right" },
          h("button", { className: "btn", style: { padding: "10px 18px" } }, "상담 신청")
        )
      ),

      body,

      /* FOOTER */
      h("footer", { className: "footer" },
        h("div", { className: "shell" },
          h("img", { className: "logo", src: "assets/cosmos-logo-ivory.svg", alt: "cosmos" }),
          h("div", { className: "fcols" },
            h("span", null, "system"), h("span", null, "habitat"),
            h("span", null, "values"), h("span", null, "contact")
          )
        )
      )
    ),

    /* TWEAKS */
    h(window.TweaksPanel, null,
      h(window.TweakSection, { label: "Featured line" }),
      h(window.TweakColor, {
        label: "라인", value: t.line === "vessel" ? "#88a3ca" : t.line === "terra" ? "#86d6a2" : "#ff946b",
        options: ["#88a3ca", "#86d6a2", "#ff946b"],
        onChange: (v) => setTweak("line", v === "#88a3ca" ? "vessel" : v === "#86d6a2" ? "terra" : "cocoon")
      }),
      h(window.TweakRadio, {
        label: "선택", value: t.line,
        options: ["vessel", "terra", "cocoon"],
        onChange: (v) => setTweak("line", v)
      }),
      h(window.TweakSection, { label: "표현" }),
      h(window.TweakToggle, {
        label: "섹션 틴트", value: t.showTints,
        onChange: (v) => setTweak("showTints", v)
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
